<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dove Cottage CMS</title>
    <link rel="stylesheet" href="/admin/custom.css" />
  </head>
  <body>
    <header class="admin-brandbar" aria-label="Dove Cottage CMS">
      <a class="admin-brandbar__home" href="/" target="_blank" rel="noopener noreferrer">
        <img src="/images/dove-logo-white.svg" alt="Dove Cottage Day Hospice" width="116" height="68" />
      </a>
      <div class="admin-brandbar__copy">
        <strong>Dove Cottage Content Manager</strong>
        <span>Update pages, news, events and media</span>
      </div>
      <a class="admin-brandbar__site" href="/" target="_blank" rel="noopener noreferrer">View Website</a>
    </header>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
