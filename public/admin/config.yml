backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
site_url: "https://www.dovecottage.org"
display_url: "https://www.dovecottage.org"

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage-content"
        label: "Homepage Content"
        file: "src/data/homepage.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Background Image", name: "backgroundImage", widget: "image" }
              - label: "Buttons"
                name: "ctas"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
                  - label: "Style"
                    name: "style"
                    widget: "select"
                    options: ["primary", "secondary", "ghost"]
          - label: "Care Services"
            name: "careServices"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Intro Text", name: "intro", widget: "text" }
          - label: "Video Feature"
            name: "videoFeature"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "YouTube Video ID", name: "youtubeId", widget: "string", hint: "For https://youtu.be/abc123 use abc123" }
          - label: "Reach Section"
            name: "reachSection"
            widget: "object"
            fields:
              - { label: "Background Image", name: "backgroundImage", widget: "image" }
              - { label: "Stat Number", name: "statNumber", widget: "string" }
              - { label: "Stat Label", name: "statLabel", widget: "string" }
              - { label: "Stat Caption", name: "statCaption", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Right Cards"
                name: "sideCards"
                widget: "list"
                min: 2
                max: 2
                fields:
                  - { label: "Icon (emoji)", name: "icon", widget: "string" }
                  - { label: "Card Title", name: "title", widget: "string" }
                  - { label: "Card Description", name: "description", widget: "string" }
          - label: "Support Section"
            name: "supportSection"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Intro Text", name: "intro", widget: "text" }
              - { label: "Left Flower Image", name: "backgroundFlowerLeft", widget: "image" }
              - { label: "Right Flower Image", name: "backgroundFlowerRight", widget: "image" }
              - label: "Support Cards"
                name: "cards"
                widget: "list"
                min: 4
                max: 4
                fields:
                  - { label: "Icon", name: "icon", widget: "image" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Button Label", name: "buttonLabel", widget: "string" }
                  - { label: "Button Link", name: "buttonLink", widget: "string" }
                  - label: "Button Variant"
                    name: "buttonVariant"
                    widget: "select"
                    options: ["primary", "secondary", "ghost"]
                  - { label: "Show Most Needed Badge", name: "featured", widget: "boolean", required: false, default: false }
          - label: "Impact Section"
            name: "impactSection"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - label: "Impact Cards"
                name: "cards"
                widget: "list"
                min: 3
                max: 3
                fields:
                  - { label: "Icon", name: "icon", widget: "image" }
                  - { label: "Amount", name: "amount", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Button Label", name: "buttonLabel", widget: "string" }
                  - { label: "Button Link", name: "buttonLink", widget: "string" }
                  - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
  - name: "subpage_reviews"
    label: "Subpage review carousel"
    files:
      - name: "subpage_reviews"
        label: "Subpage review carousel"
        file: "src/data/subpage-reviews.json"
        format: "json"
        fields:
          - {
              label: "Rotation speed (milliseconds)",
              name: "intervalMs",
              widget: "number",
              value_type: "int",
              min: 1800,
              default: 3200,
              hint: "How long each quote stays visible before fading to the next one.",
            }
          - {
              label: "Support button text",
              name: "supportCtaLabel",
              widget: "string",
              default: "How you can support us",
            }
          - {
              label: "Support button link",
              name: "supportCtaHref",
              widget: "string",
              default: "#",
              hint: "Set this to your future support page URL when ready.",
            }
          - label: "Reviews"
            name: "reviews"
            widget: "list"
            min: 1
            max: 8
            fields:
              - { label: "Caption", name: "text", widget: "string" }
  - name: "news"
    label: "News"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "news/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "string", default: "News" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Publish Date", name: "publishDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author", name: "author", widget: "string", default: "Dove Cottage Day Hospice" }
      - {
          label: "Event date (optional)",
          name: "eventDate",
          widget: "datetime",
          required: false,
          date_format: "YYYY-MM-DD",
          time_format: false,
          hint: "For event announcements: first day of the event. Shown as “Event dates” on the post and in the News & Events grid.",
        }
      - {
          label: "Event end date (optional)",
          name: "eventEndDate",
          widget: "datetime",
          required: false,
          date_format: "YYYY-MM-DD",
          time_format: false,
          hint: "Last day if the event runs over multiple days (e.g. weekend). Leave empty for a single-day event.",
        }
      - {
          label: "Event location (optional)",
          name: "eventLocation",
          widget: "string",
          required: false,
          hint: "Venue and address as you want it to appear (e.g. Courtyard Barns, Wartnaby, LE14 3HU).",
        }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "events"
    label: "Events"
    folder: "src/content/events"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "events/{{slug}}"
    fields:
      - { label: "Event title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "string", default: "Event", hint: "Shown as a tag on the event page (e.g. Event, Fundraising)." }
      - { label: "Short summary", name: "excerpt", widget: "text", hint: "Used in listings and search snippets." }
      - {
          label: "Event dates — start day",
          name: "eventDate",
          widget: "datetime",
          date_format: "YYYY-MM-DD",
          time_format: false,
          hint: "Shown under “Event dates” on the event page and in the News & Events grid.",
        }
      - {
          label: "Event dates — end day (optional)",
          name: "eventEndDate",
          widget: "datetime",
          required: false,
          date_format: "YYYY-MM-DD",
          time_format: false,
          hint: "For multi-day events only. Leave empty for a single day.",
        }
      - {
          label: "Location",
          name: "location",
          widget: "string",
          hint: "Venue name and address as visitors should see it.",
        }
      - { label: "Featured image", name: "featuredImage", widget: "image", required: false }
      - { label: "Booking link (optional)", name: "bookingUrl", widget: "string", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "newsletters"
    label: "Newsletters"
    folder: "src/content/newsletters"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "newsletter/"
    media_folder: "public/newsletters"
    public_folder: "/newsletters"
    fields:
      - { label: "Title (shown on archive)", name: "title", widget: "string" }
      - {
          label: "Issue date",
          name: "issueDate",
          widget: "datetime",
          date_format: "YYYY-MM-DD",
          time_format: false,
        }
      - {
          label: "PDF file",
          name: "file",
          widget: "file",
          hint: "Upload the newsletter PDF. Files are stored in public/newsletters.",
        }
      - {
          label: "Download button label",
          name: "fileLabel",
          widget: "string",
          required: false,
          default: "Download PDF",
        }
      - {
          label: "Short summary (optional)",
          name: "excerpt",
          widget: "text",
          required: false,
        }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - {
          label: "Editor notes (optional, not shown on site)",
          name: "body",
          widget: "markdown",
          required: false,
          hint: "Optional internal notes; the public archive uses title, date, summary, and PDF only.",
        }
  - name: "shops"
    label: "Shops"
    folder: "src/content/shops"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "shops/{{slug}}"
    fields:
      - { label: "Shop Name", name: "title", widget: "string" }
      - {
          label: "Hero location line",
          name: "hero_location",
          widget: "string",
          required: false,
          hint: "e.g. Bottesford — large white line on the hero. Leave empty to use the full shop name.",
        }
      - {
          label: "Hero tagline",
          name: "hero_tagline",
          widget: "string",
          required: false,
          default: "Hospice Shop",
          hint: "Yellow line under the location (only if Hero location is set).",
        }
      - { label: "Shop info", name: "shop_info", widget: "markdown" }
      - {
          label: "Callout box",
          name: "callout",
          widget: "markdown",
          required: false,
          hint: "Optional highlight below the main story (heart icon box).",
        }
      - { label: "Shop Main Image", name: "shop_main_image", widget: "image" }
      - { label: "Opening hours", name: "opening_hours", widget: "markdown" }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Button Colour", name: "button_colour", widget: "string", default: "#2d6fb3" }
      - { label: "Phone", name: "phone", widget: "string" }
      - { label: "Address", name: "address", widget: "text" }
      - {
          label: "Map embed URL",
          name: "map_embed_url",
          widget: "string",
          required: false,
          hint: "Optional. Paste the iframe src from Google Maps → Share → Embed. If empty, a map is generated from the address.",
        }
      - {
          label: "Donations blurb",
          name: "donations_blurb",
          widget: "text",
          required: false,
          hint: "Short text for the Visit sidebar (what donations you accept).",
        }
      - { label: "Facebook Link", name: "facebook_link", widget: "string", required: false }
      - { label: "Instagram Link", name: "instagram_link", widget: "string", required: false }
      - { label: "Html Test", name: "html_test", widget: "text", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }
  - name: "pages"
    label: "Pages"
    files:
      - name: "contact"
        label: "Contact page"
        file: "src/data/contact.json"
        format: "json"
        fields:
          - {
              label: "Page title (browser tab)",
              name: "pageTitle",
              widget: "string",
              default: "Contact us | Dove Cottage",
            }
          - {
              label: "Hero image",
              name: "heroImage",
              widget: "image",
              hint: "Photo at the top of the contact hero card. Upload or pick from the media library.",
            }
          - {
              label: "Hero image description (accessibility)",
              name: "heroImageAlt",
              widget: "string",
              default: "People supported in our day hospice and community",
              hint: "Short description for screen readers and SEO.",
            }
          - { label: "Hero badge (uppercase pill)", name: "heroBadge", widget: "string" }
          - {
              label: "Hero title — first part",
              name: "heroTitleBefore",
              widget: "string",
              hint: "e.g. Get in touch with",
            }
          - {
              label: "Hero title — highlight",
              name: "heroTitleHighlight",
              widget: "string",
              hint: "e.g. our team (shown in brand blue on the page)",
            }
          - { label: "Hero description", name: "heroDescription", widget: "text" }
          - { label: "Trust bar — charity line", name: "trustCharityLine", widget: "string" }
          - {
              label: "Trust bar — phone (digits for links, no spaces)",
              name: "trustPhone",
              widget: "string",
              hint: "01949860303 — used for tel: links across the page.",
            }
          - {
              label: "Trust bar — phone display",
              name: "trustPhoneDisplay",
              widget: "string",
              hint: "01949 860303 — how the number appears on screen.",
            }
          - { label: "Trust bar — Donate button label", name: "trustDonateLabel", widget: "string" }
          - {
              label: "Trust bar — Donate button URL",
              name: "trustDonateUrl",
              widget: "string",
              default: "/donate/",
            }
          - {
              label: "Main — small label (all caps line)",
              name: "mainEyebrow",
              widget: "string",
            }
          - { label: "Main — heading", name: "mainHeading", widget: "string" }
          - { label: "Main — intro paragraph", name: "mainLede", widget: "text" }
          - { label: "Form — section title", name: "formSectionTitle", widget: "string" }
          - {
              label: "Form — note under title (markdown)",
              name: "formNoteMarkdown",
              widget: "markdown",
              hint: "Supports **bold** and [phone links](tel:01949860303).",
            }
          - {
              label: "Fillout form ID",
              name: "filloutFormId",
              widget: "string",
              hint: "From Fillout embed code (e.g. xrJnnVS553us).",
            }
          - { label: "Sidebar — card title", name: "sidebarCardTitle", widget: "string" }
          - { label: "Opening hours", name: "openingHours", widget: "string" }
          - { label: "Address (line 1–2, shown before postcode)", name: "addressLine1", widget: "text" }
          - { label: "Postcode", name: "addressPostcode", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Footer line (sidebar, charity no.)", name: "sideCharityFooter", widget: "string" }
          - { label: "Map — card title", name: "mapCardTitle", widget: "string" }
          - {
              label: "Map — search (for embed & Google link)",
              name: "mapSearchQuery",
              widget: "string",
              hint: "Full address; used to build the map and “Open in Google Maps”.",
            }
          - { label: "Map — link label", name: "mapLinkLabel", widget: "string" }
      - name: "donate"
        label: "Donate page"
        file: "src/data/donate.json"
        format: "json"
        fields:
          - { label: "Page title (browser tab)", name: "pageTitle", widget: "string", default: "Donate | Dove Cottage" }
          - { label: "Hero image", name: "heroImage", widget: "image" }
          - { label: "Hero image alt (accessibility)", name: "heroImageAlt", widget: "string" }
          - { label: "Back link — label (e.g. All ways to support)", name: "allWaysToSupportLabel", widget: "string" }
          - { label: "Back link — URL", name: "allWaysToSupportHref", widget: "string" }
          - { label: "Hero title — first part", name: "heroTitleBefore", widget: "string" }
          - { label: "Hero title — highlight (yellow)", name: "heroTitleHighlight", widget: "string" }
          - { label: "Hero description", name: "heroDescription", widget: "text" }
          - { label: "Primary CTA (e.g. Donate now) — label", name: "heroPrimaryCtaLabel", widget: "string" }
          - { label: "Primary CTA — URL (can be anchor #)", name: "heroPrimaryCtaHref", widget: "string" }
          - { label: "Secondary CTA — label", name: "heroSecondaryCtaLabel", widget: "string" }
          - { label: "Secondary CTA — URL", name: "heroSecondaryCtaHref", widget: "string" }
          - {
              label: "Give online — section title",
              name: "donateFormSectionTitle",
              widget: "string",
              default: "Give online",
            }
          - {
              label: "Give online — intro (above the form)",
              name: "donateFormIntro",
              widget: "text",
              hint: "Shown above the Beacon donation embed.",
            }
          - {
              label: "Beacon account slug",
              name: "beaconAccount",
              widget: "string",
              default: "dovecottagedayhospice",
              hint: "Usually dovecottagedayhospice — same as other Beacon forms on the site.",
            }
          - {
              label: "Beacon donation form ID",
              name: "beaconDonateFormId",
              widget: "string",
              required: false,
              hint: "From Beacon (data-form value). When set, the secure donation form appears on the donate page. Set the form’s thank-you / redirect URL in Beacon to /donation-thank-you/",
            }
          - { label: "Main — about eyebrow", name: "aboutEyebrow", widget: "string" }
          - { label: "Main — about heading (H2)", name: "aboutHeading", widget: "string" }
          - { label: "About — paragraph 1", name: "aboutParagraph1", widget: "text" }
          - { label: "About — paragraph 2", name: "aboutParagraph2", widget: "text" }
          - { label: "Impact block — heading", name: "impactHeading", widget: "string" }
          - { label: "Impact block — intro", name: "impactLede", widget: "text" }
          - label: "Impact cards (grid)"
            name: "impactCards"
            widget: "list"
            min: 1
            max: 6
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Button label", name: "ctaLabel", widget: "string" }
              - { label: "Button link", name: "ctaHref", widget: "string" }
          - { label: "Sidebar — card title", name: "suggestedMethodsTitle", widget: "string" }
          - label: "Sidebar — suggested methods"
            name: "suggestedMethods"
            widget: "list"
            min: 1
            max: 6
            fields:
              - label: "Icon"
                name: "icon"
                widget: "select"
                options: ["web", "repeat", "phone", "map"]
                hint: "web=online, repeat=regular giving, phone, map=visit"
              - { label: "Label (e.g. Donate online)", name: "kicker", widget: "string", required: false }
              - { label: "Description", name: "body", widget: "text" }
      - name: "make_a_referral"
        label: "Make a Referral page"
        file: "src/data/make-a-referral.json"
        format: "json"
        fields:
          - { label: "Page title (browser tab)", name: "pageTitle", widget: "string", default: "Make a Referral | Dove Cottage" }
          - { label: "Hero image (featured)", name: "heroImage", widget: "image" }
          - { label: "Hero image description (accessibility)", name: "heroImageAlt", widget: "string" }
          - { label: "Back link — label", name: "parentNavLabel", widget: "string", default: "Hospice Services" }
          - { label: "Back link — URL", name: "parentNavHref", widget: "string", default: "/hospice-services/" }
          - { label: "Hero title (H1)", name: "heroH1", widget: "string", default: "Make a Referral" }
          - { label: "Hero subtitle (short description)", name: "heroShortDescription", widget: "text" }
          - { label: "Intro paragraph (markdown)", name: "introMarkdown", widget: "markdown" }
          - { label: "Main content (markdown)", name: "bodyMarkdown", widget: "markdown" }
          - { label: "Beacon account slug", name: "beaconAccount", widget: "string", default: "dovecottagedayhospice" }
          - { label: "Beacon form ID", name: "beaconFormId", widget: "string", default: "fe636194" }
      - name: "meet_the_team"
        label: "Meet the Team"
        file: "src/data/meet-the-team.json"
        format: "json"
        fields:
          - { label: "1) Page title (browser tab)", name: "pageTitle", widget: "string", hint: "Appears in the browser tab and search results." }
          - { label: "2) Meta description", name: "metaDescription", widget: "text", hint: "Short summary for search engines." }
          - { label: "3) Hero image (featured)", name: "heroImage", widget: "image" }
          - { label: "4) Hero image alt text", name: "heroImageAlt", widget: "string" }
          - { label: "5) Back link label", name: "parentNavLabel", widget: "string", default: "About Us" }
          - { label: "6) Back link URL", name: "parentNavHref", widget: "string", default: "/about-us/", hint: "Usually /about-us/ for this page." }
          - { label: "7) Hero title (H1)", name: "heroH1", widget: "string", default: "Meet the Team" }
          - { label: "8) Hero subtitle", name: "heroShortDescription", widget: "text" }
          - label: "9) Trust section rows (top content blocks)"
            name: "trustBlocks"
            widget: "list"
            min: 2
            max: 6
            summary: "{{fields.title}}"
            hint: "These render as the two alternating image/text rows near the top."
            fields:
              - { label: "Heading", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image alt text", name: "imageAlt", widget: "string" }
          - label: "10) Department overview cards"
            name: "departments"
            widget: "list"
            min: 3
            max: 12
            summary: "{{fields.name}}"
            hint: "Small cards with title, description, and optional photo."
            fields:
              - { label: "Department name", name: "name", widget: "string" }
              - { label: "Short description", name: "description", widget: "text" }
              - { label: "Department image (optional)", name: "image", widget: "image", required: false }
              - { label: "Department image alt text (optional)", name: "imageAlt", widget: "string", required: false }
          - label: "11) Team groups and members"
            name: "teamGroups"
            widget: "list"
            min: 1
            max: 12
            summary: "{{fields.title}}"
            hint: "Example groups: CEO, Nursing Team, Admin & Support, Shop Staff, Trustees."
            fields:
              - { label: "Group heading", name: "title", widget: "string" }
              - label: "Members"
                name: "members"
                widget: "list"
                min: 1
                max: 50
                summary: "{{fields.name}} — {{fields.jobTitle}}"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Job title", name: "jobTitle", widget: "string" }
                  - { label: "Photo", name: "photo", widget: "image" }
                  - { label: "Photo alt text", name: "photoAlt", widget: "string", required: false }
          - label: "12) Stats bar (3 cards)"
            name: "stats"
            widget: "list"
            min: 3
            max: 3
            summary: "{{fields.value}} {{fields.label}}"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "13) Testimonials (slider)"
            name: "testimonials"
            widget: "list"
            min: 1
            max: 8
            summary: "{{fields.authorName}} — {{fields.authorRole}}"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Star rating (1-5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }
              - { label: "Author name", name: "authorName", widget: "string" }
