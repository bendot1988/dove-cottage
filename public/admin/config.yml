backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage-content"
        label: "Homepage Content"
        file: "src/data/homepage.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Background Image", name: "backgroundImage", widget: "image" }
              - label: "Buttons"
                name: "ctas"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
                  - label: "Style"
                    name: "style"
                    widget: "select"
                    options: ["primary", "secondary", "ghost"]
          - label: "Care Services"
            name: "careServices"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Intro Text", name: "intro", widget: "text" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                min: 4
                max: 4
                fields:
                  - { label: "Tag Text", name: "tag", widget: "string" }
                  - label: "Tag Color"
                    name: "tagClass"
                    widget: "select"
                    options: ["tag-blue", "tag-green", "tag-orange", "tag-purple"]
                  - { label: "Card Title", name: "title", widget: "string" }
                  - { label: "Card Description", name: "description", widget: "text" }
                  - { label: "Card Image", name: "image", widget: "image" }
                  - { label: "Image Position", name: "imagePosition", widget: "string", hint: "Example: center 44%" }
                  - { label: "Card Link", name: "href", widget: "string" }
          - label: "Video Feature"
            name: "videoFeature"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "YouTube Video ID", name: "youtubeId", widget: "string", hint: "For https://youtu.be/abc123 use abc123" }
          - label: "Reach Section"
            name: "reachSection"
            widget: "object"
            fields:
              - { label: "Background Image", name: "backgroundImage", widget: "image" }
              - { label: "Stat Number", name: "statNumber", widget: "string" }
              - { label: "Stat Label", name: "statLabel", widget: "string" }
              - { label: "Stat Caption", name: "statCaption", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Right Cards"
                name: "sideCards"
                widget: "list"
                min: 2
                max: 2
                fields:
                  - { label: "Icon (emoji)", name: "icon", widget: "string" }
                  - { label: "Card Title", name: "title", widget: "string" }
                  - { label: "Card Description", name: "description", widget: "string" }
          - label: "Support Section"
            name: "supportSection"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Intro Text", name: "intro", widget: "text" }
              - { label: "Left Flower Image", name: "backgroundFlowerLeft", widget: "image" }
              - { label: "Right Flower Image", name: "backgroundFlowerRight", widget: "image" }
              - label: "Support Cards"
                name: "cards"
                widget: "list"
                min: 4
                max: 4
                fields:
                  - { label: "Icon", name: "icon", widget: "image" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Button Label", name: "buttonLabel", widget: "string" }
                  - { label: "Button Link", name: "buttonLink", widget: "string" }
                  - label: "Button Variant"
                    name: "buttonVariant"
                    widget: "select"
                    options: ["primary", "secondary", "ghost"]
                  - { label: "Show Most Needed Badge", name: "featured", widget: "boolean", required: false, default: false }
          - label: "Impact Section"
            name: "impactSection"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - label: "Impact Cards"
                name: "cards"
                widget: "list"
                min: 3
                max: 3
                fields:
                  - { label: "Icon", name: "icon", widget: "image" }
                  - { label: "Amount", name: "amount", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Button Label", name: "buttonLabel", widget: "string" }
                  - { label: "Button Link", name: "buttonLink", widget: "string" }
                  - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
  - name: "news"
    label: "News & Events"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "news/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "string", default: "News" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Publish Date", name: "publishDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author", name: "author", widget: "string", default: "Dove Cottage Day Hospice" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "shops"
    label: "Shops"
    folder: "src/content/shops"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "shops/{{slug}}"
    fields:
      - { label: "Shop Name", name: "title", widget: "string" }
      - {
          label: "Hero location line",
          name: "hero_location",
          widget: "string",
          required: false,
          hint: "e.g. Bottesford — large white line on the hero. Leave empty to use the full shop name.",
        }
      - {
          label: "Hero tagline",
          name: "hero_tagline",
          widget: "string",
          required: false,
          default: "Hospice Shop",
          hint: "Yellow line under the location (only if Hero location is set).",
        }
      - { label: "Shop info", name: "shop_info", widget: "markdown" }
      - {
          label: "Callout box",
          name: "callout",
          widget: "markdown",
          required: false,
          hint: "Optional highlight below the main story (heart icon box).",
        }
      - { label: "Shop Main Image", name: "shop_main_image", widget: "image" }
      - { label: "Opening hours", name: "opening_hours", widget: "markdown" }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Button Colour", name: "button_colour", widget: "string", default: "#2d6fb3" }
      - { label: "Phone", name: "phone", widget: "string" }
      - { label: "Address", name: "address", widget: "text" }
      - {
          label: "Map embed URL",
          name: "map_embed_url",
          widget: "string",
          required: false,
          hint: "Optional. Paste the iframe src from Google Maps → Share → Embed. If empty, a map is generated from the address.",
        }
      - {
          label: "Donations blurb",
          name: "donations_blurb",
          widget: "text",
          required: false,
          hint: "Short text for the Visit sidebar (what donations you accept).",
        }
      - { label: "Facebook Link", name: "facebook_link", widget: "string", required: false }
      - { label: "Instagram Link", name: "instagram_link", widget: "string", required: false }
      - { label: "Html Test", name: "html_test", widget: "text", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }
  - name: "contact"
    label: "Contact us"
    files:
      - name: "contact"
        label: "Contact page"
        file: "src/data/contact.json"
        format: "json"
        fields:
          - {
              label: "Page title (browser tab)",
              name: "pageTitle",
              widget: "string",
              default: "Contact us | Dove Cottage",
            }
          - {
              label: "Hero image",
              name: "heroImage",
              widget: "image",
              hint: "Photo at the top of the contact hero card. Upload or pick from the media library.",
            }
          - {
              label: "Hero image description (accessibility)",
              name: "heroImageAlt",
              widget: "string",
              default: "People supported in our day hospice and community",
              hint: "Short description for screen readers and SEO.",
            }
          - { label: "Hero badge (uppercase pill)", name: "heroBadge", widget: "string" }
          - {
              label: "Hero title — first part",
              name: "heroTitleBefore",
              widget: "string",
              hint: "e.g. Get in touch with",
            }
          - {
              label: "Hero title — highlight",
              name: "heroTitleHighlight",
              widget: "string",
              hint: "e.g. our team (shown in brand blue on the page)",
            }
          - { label: "Hero description", name: "heroDescription", widget: "text" }
          - { label: "Trust bar — charity line", name: "trustCharityLine", widget: "string" }
          - {
              label: "Trust bar — phone (digits for links, no spaces)",
              name: "trustPhone",
              widget: "string",
              hint: "01949860303 — used for tel: links across the page.",
            }
          - {
              label: "Trust bar — phone display",
              name: "trustPhoneDisplay",
              widget: "string",
              hint: "01949 860303 — how the number appears on screen.",
            }
          - { label: "Trust bar — Donate button label", name: "trustDonateLabel", widget: "string" }
          - {
              label: "Trust bar — Donate button URL",
              name: "trustDonateUrl",
              widget: "string",
              default: "#",
            }
          - {
              label: "Main — small label (all caps line)",
              name: "mainEyebrow",
              widget: "string",
            }
          - { label: "Main — heading", name: "mainHeading", widget: "string" }
          - { label: "Main — intro paragraph", name: "mainLede", widget: "text" }
          - { label: "Form — section title", name: "formSectionTitle", widget: "string" }
          - {
              label: "Form — note under title (markdown)",
              name: "formNoteMarkdown",
              widget: "markdown",
              hint: "Supports **bold** and [phone links](tel:01949860303).",
            }
          - {
              label: "Fillout form ID",
              name: "filloutFormId",
              widget: "string",
              hint: "From Fillout embed code (e.g. xrJnnVS553us).",
            }
          - { label: "Sidebar — card title", name: "sidebarCardTitle", widget: "string" }
          - { label: "Opening hours", name: "openingHours", widget: "string" }
          - { label: "Address (line 1–2, shown before postcode)", name: "addressLine1", widget: "text" }
          - { label: "Postcode", name: "addressPostcode", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Footer line (sidebar, charity no.)", name: "sideCharityFooter", widget: "string" }
          - { label: "Map — card title", name: "mapCardTitle", widget: "string" }
          - {
              label: "Map — search (for embed & Google link)",
              name: "mapSearchQuery",
              widget: "string",
              hint: "Full address; used to build the map and “Open in Google Maps”.",
            }
          - { label: "Map — link label", name: "mapLinkLabel", widget: "string" }
